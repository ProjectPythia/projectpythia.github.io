# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  id: 770e49e5-344a-4c46-adaa-3afb060b2085
  authors: Project Pythia Community
  github: https://github.com/projectpythia/projectpythia.github.io
  plugins:
    - https://github.com/myst-contrib/myst-listing/releases/latest/download/plugin.mjs
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        - 'chro@ucar.edu'
        - 'http://localhost:3000'
        - 'https://github.com/YOUR_USER_NAME/pythia-foundations'
        - 'https://pangeo.io'
        - 'https://docs.google.com/**'
    - rule: image-format-optimizes # `metrics.md` has some large images that are not optimized
      severity: ignore
    - rule: container-children-valid # `metrics.md`` unexpected figure content of type output found in legend node, but works when the site is built
      severity: ignore

  toc:
    - file: index.md
    - file: about.md
    - file: blog.md
      children:
      - title: "2026"
        children:
        - file: posts/2026/cookoff-2026.md
        - file: posts/2026/gallery-listing.md
        - file: posts/2026/gh-actions.md
      - title: "2025"
        children:
        - file: posts/2025/mystification.md
        - file: posts/2025/cookoff2025-website.md
        - file: posts/2025/binderhub_status.md
        - file: posts/2025/new-cookbooks.md
      - title: "2024"
        children:
        - file: posts/2024/cookoff2024-website.md
      - title: "2023"
        children:
        - file: posts/2023/cookoff2024-savethedate.md
        - file: posts/2023/fundraiser.md
        - file: posts/2023/cookoff2023.md
    - file: contributing.md
      children:
      - file: developing.md
    - file: cookbook-guide.md
    - file: quick-cookbook-guide.md
    - file: metrics.md
    - file: ../CODEOFCONDUCT.md

site:
  domains: []
  options:
    style: style.css
    analytics_google: G-T9KGMX7VHZ # Measurement ID or Tracking ID
